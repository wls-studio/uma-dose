<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Página não encontrada — Uma dose de equilíbrio</title>
  <meta name="robots" content="noindex" />
  <style>
    :root { --papel:#F7F4EF; --cafe:#2E2A26; --suave:#6F675D; --mel:#B08A3E; --mel-escuro:#8A6728; }
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh; display: grid; place-items: center;
      background: var(--papel); color: var(--cafe); text-align: center;
      font-family: "Karla", "Segoe UI", system-ui, sans-serif; padding: 24px; line-height: 1.6;
    }
    .rotulo { font-weight: 700; font-size: 12px; letter-spacing: .22em; text-transform: uppercase; color: var(--mel-escuro); }
    h1 { font-family: "Fraunces", Georgia, serif; font-weight: 450; font-size: clamp(2rem, 6vw, 3rem); margin: 14px 0 10px; line-height: 1.12; }
    em { color: var(--mel); }
    p.txt { color: var(--suave); max-width: 42ch; margin: 0 auto 26px; }
    a { display: inline-block; background: var(--mel-escuro); color: #fff; font-weight: 700;
        padding: 13px 26px; border-radius: 999px; text-decoration: none; }
    a:hover { filter: brightness(1.08); }
  </style>
</head>
<body>
  <div>
    <p class="rotulo">Erro 404</p>
    <h1>Essa página <em>respirou fundo</em> e saiu.</h1>
    <p class="txt">O endereço que você acessou não existe ou foi movido. Volte pro início — a Maria te espera lá.</p>
    <!-- DEMO: na publicação no domínio real, trocar href por "/" -->
    <a href="/uma-dose/">Voltar ao início</a>
  </div>
</body>
</html>
